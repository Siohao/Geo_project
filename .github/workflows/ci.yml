name: Python CI

on:
  push:
    branches: [main, log-pytest]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.5
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin
          POSTGRES_DB: test_db
          POSTGRES_HOST: localhost
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U admin"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Chekout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14.3"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create test user in test_db
        run: |
          PGPASSWORD=admin psql -h localhost -U admin -d test_db -c "CREATE USER test_user WITH PASSWORD 'test123';"
          PGPASSWORD=admin psql -h localhost -U admin -d test_db -c "GRANT ALL PRIVILEGES ON DATABASE test_db TO test_user;"
          PGPASSWORD=admin psql -h localhost -U admin -d test_db -c "GRANT ALL ON SCHEMA public TO test_user;"

      - name: Run tests
        env: 
          POSTGRES_HOST: localhost
          POSTGRAS_NAME: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test123
          POSTGRES_PORT: 5432
        run: |
          pytest